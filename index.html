<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>單字學習艙 - 英文學習系統</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .chapter-card:hover .chapter-icon {
            transform: scale(1.1) rotate(-5deg);
        }

        .chapter-icon {
            transition: transform 0.3s ease;
        }

        /* 載入動畫 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fadeIn {
            animation: fadeIn 0.5s ease forwards;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen">

    <!-- 頂部導覽列 (Navbar) -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <!-- Left: Logo -->
                <div class="flex items-center space-x-3">
                    <div
                        class="bg-indigo-600 h-10 w-10 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                        <i class="fa-solid fa-layer-group text-white text-lg"></i>
                    </div>
                    <span class="text-xl font-bold tracking-tight text-slate-900">單字學習艙</span>
                </div>
                <!-- Right: Status -->
                <div class="text-slate-400 text-sm hidden sm:block">
                    <i class="fa-regular fa-calendar-check mr-1"></i> 準備好開始學習了嗎？
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">

        <!-- 歡迎區塊 (Hero Section) -->
        <section class="mb-16 text-center">
            <h1 class="text-3xl sm:text-4xl font-extrabold text-slate-900 mb-4">
                挑選一個章節開始複習
            </h1>
            <p class="text-slate-500 text-lg max-w-2xl mx-auto">
                系統會自動掃描資料庫中的 JSON 詞庫並顯示單字數量。
            </p>
        </section>

        <!-- 章節選擇網格 (Chapter Grid) -->
        <section>
            <div class="flex items-center justify-between mb-8 border-l-4 border-indigo-500 pl-4">
                <h2 class="text-2xl font-bold text-slate-900">所有章節</h2>
                <span id="chapter-count"
                    class="text-sm font-medium bg-slate-200 text-slate-600 px-3 py-1 rounded-full">掃描中...</span>
            </div>

            <div id="chapter-grid"
                class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 text-center sm:text-left">
                <!-- 預設骨架屏 -->
                <div id="loading-skeleton"
                    class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm animate-pulse lg:col-span-3">
                    <div class="h-10 bg-slate-100 rounded w-1/4 mx-auto sm:mx-0"></div>
                </div>
            </div>
        </section>
    </main>

    <footer class="mt-20 py-10 border-t border-slate-200 text-center text-slate-400 text-sm">
        <p>© 2024 單字學習艙 VocabCabin. 檔案讀取自 ./static/data/</p>
    </footer>

</body>
<script src="./static/js/index.js"></script>
<script src="./static/js/location.js"></script>

</html>
