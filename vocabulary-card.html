<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>質感單字卡 UI</title>
    <meta name="theme-color" content="#4f46e5">
    <meta name="description" content="翻卡式英文單字練習，支援安裝與離線使用。">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./static/icons/icon-192.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./static/icons/icon-192.svg">
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 FontAwesome 圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 3D 翻轉核心設定 */
        .perspective-1000 {
            perspective: 1000px;
        }
        .transform-style-3d {
            transform-style: preserve-3d;
        }
        .backface-hidden {
            backface-visibility: hidden;
        }
        .rotate-y-180 {
            transform: rotateY(180deg);
        }
        
        /* 平滑過渡效果 */
        .card-inner {
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
        }

        .card-shell {
            transition: transform 0.28s ease, opacity 0.28s ease, box-shadow 0.28s ease;
            touch-action: pan-y;
        }

        .card-shell.swipe-left::after,
        .card-shell.swipe-right::after {
            position: absolute;
            top: 1.5rem;
            padding: 0.55rem 0.95rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.18em;
            color: white;
            pointer-events: none;
        }

        .card-shell.swipe-left::after {
            content: "NOT YET";
            left: 1.5rem;
            background: linear-gradient(135deg, #f97316, #ef4444);
            box-shadow: 0 14px 28px rgba(239, 68, 68, 0.25);
        }

        .card-shell.swipe-right::after {
            content: "MASTERED";
            right: 1.5rem;
            background: linear-gradient(135deg, #22c55e, #14b8a6);
            box-shadow: 0 14px 28px rgba(34, 197, 94, 0.22);
        }

        .card-shell.is-animating {
            pointer-events: none;
        }

        .card-shell.is-exiting-left {
            transform: translateX(-135%) rotate(-16deg) scale(0.96);
            opacity: 0;
        }

        .card-shell.is-exiting-right {
            transform: translateX(135%) rotate(16deg) scale(0.96);
            opacity: 0;
        }

        .result-modal-open {
            overflow: hidden;
        }

        /* 自訂滾動條，保持整潔 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }

        .word-display {
            max-width: 100%;
            overflow-wrap: anywhere;
            word-break: break-word;
            line-height: 0.9;
            text-wrap: balance;
        }

        .word-size-default {
            font-size: clamp(2.9rem, 10vw, 4.5rem);
        }

        .word-size-long {
            font-size: clamp(2.4rem, 8vw, 3.8rem);
        }

        .word-size-xlong {
            font-size: clamp(1.9rem, 6.6vw, 3.1rem);
        }

        .back-word-display.word-size-default {
            font-size: clamp(2rem, 5.4vw, 3rem);
        }

        .back-word-display.word-size-long {
            font-size: clamp(1.8rem, 4.6vw, 2.5rem);
        }

        .back-word-display.word-size-xlong {
            font-size: clamp(1.55rem, 3.8vw, 2.1rem);
        }

        @media (min-width: 768px) {
            .word-size-default {
                font-size: clamp(4.5rem, 8vw, 6rem);
            }

            .word-size-long {
                font-size: clamp(3.6rem, 6.5vw, 5rem);
            }

            .word-size-xlong {
                font-size: clamp(2.8rem, 5.2vw, 4rem);
            }

            .back-word-display.word-size-default {
                font-size: clamp(2.4rem, 3.5vw, 3.4rem);
            }

            .back-word-display.word-size-long {
                font-size: clamp(2rem, 2.9vw, 2.8rem);
            }

            .back-word-display.word-size-xlong {
                font-size: clamp(1.7rem, 2.4vw, 2.25rem);
            }
        }
    </style>
</head>
<body class="bg-slate-100 h-screen overflow-hidden flex flex-col items-center justify-center p-3 md:p-5 font-sans text-slate-800">

    <div class="w-full max-w-5xl mb-3 md:mb-4">
        <div class="relative flex items-center justify-center min-h-12">
            <button id="exit-button" type="button" class="absolute left-0 inline-flex h-11 w-11 items-center justify-center rounded-full border border-slate-200 bg-white text-slate-500 shadow-sm transition hover:text-slate-800 hover:shadow" title="離開">
                <i class="fa-solid fa-xmark text-lg"></i>
            </button>
            <span id="word-counter" class="text-slate-500 font-bold text-base md:text-lg whitespace-nowrap text-center tracking-[0.18em]">
                1 / 1
            </span>
        </div>

        <div class="mt-3 flex items-center justify-center gap-2 md:gap-3">
            <span id="unknown-count-chip" class="rounded-full border border-orange-100 bg-orange-50 px-3 py-1.5 text-xs md:text-sm font-semibold text-orange-700">
                不會 0
            </span>
            <span id="known-count-chip" class="rounded-full border border-emerald-100 bg-emerald-50 px-3 py-1.5 text-xs md:text-sm font-semibold text-emerald-700">
                會 0
            </span>
        </div>
    </div>

    <div class="perspective-1000 w-full max-w-5xl h-[calc(100vh-9.5rem)] md:h-[calc(100vh-10rem)] max-h-[760px] min-h-[480px] relative">
        
        <!-- 卡片翻轉主體 -->
        <div id="card-shell" class="card-shell w-full h-full relative">
        <div id="flashcard" class="card-inner w-full h-full relative transform-style-3d shadow-xl rounded-2xl">
            
            <!-- ================= 正面 (單字回想區) ================= -->
            <div class="absolute inset-0 w-full h-full backface-hidden bg-white rounded-2xl border border-slate-100 flex flex-col items-center justify-center cursor-pointer" onclick="flipCard()">
                <div class="text-center flex flex-col items-center w-full px-5 sm:px-8 md:px-10">
                    <div class="inline-flex max-w-full flex-col items-center">
                        <p class="text-slate-400 font-medium mb-4 uppercase tracking-widest text-sm">Tap to reveal</p>
                        <div class="inline-flex max-w-full items-center justify-center gap-2 md:gap-3">
                            <h2 id="front-word" class="word-display word-size-default min-w-0 font-extrabold text-slate-800 tracking-tight text-center">Loading...</h2>
                        <!-- 🌟 正面：單字發音按鈕 🌟 -->
                            <button onclick="speakText('front-word', event)" class="shrink-0 self-center text-slate-300 hover:text-indigo-500 transition-colors p-1.5 md:p-2" title="聆聽單字發音">
                                <i class="fa-solid fa-volume-high text-2xl md:text-4xl"></i>
                            </button>
                        </div>
                    </div>
                    <p class="mt-6 text-slate-400"><i class="fa-solid fa-rotate text-2xl animate-pulse"></i></p>
                </div>
            </div>

            <!-- ================= 背面 (詳細資訊區) ================= -->
            <div class="absolute inset-0 w-full h-full backface-hidden bg-white rounded-2xl border border-slate-100 rotate-y-180 flex flex-col overflow-hidden">
                
                <!-- 頂部 Header：單字、詞性、中文意思 -->
                <div class="bg-slate-50 border-b border-slate-100 p-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 cursor-pointer" onclick="flipCard()">
                    <div class="w-full min-w-0">
                        <div class="flex items-end gap-2 sm:gap-3 mb-1 w-full min-w-0">
                            <h2 id="back-word" class="back-word-display word-display word-size-long min-w-0 font-bold text-slate-800">Loading...</h2>
                            <span id="pos" class="px-3 py-1 bg-indigo-100 text-indigo-700 text-sm font-semibold rounded-md mb-1">...</span>
                            <!-- 🌟 背面：單字發音按鈕 🌟 -->
                            <button onclick="speakText('back-word', event)" class="mb-1.5 w-8 h-8 shrink-0 flex items-center justify-center rounded-full bg-slate-200/60 text-slate-500 hover:bg-indigo-100 hover:text-indigo-600 transition-colors" title="聆聽單字發音">
                                <i class="fa-solid fa-volume-high text-sm"></i>
                            </button>
                        </div>
                        <h3 id="meaning" class="text-xl text-slate-600 font-medium zh-text">載入中...</h3>
                    </div>
                    <div class="text-slate-400 hover:text-indigo-500 transition-colors" title="翻轉回正面">
                        <i class="fa-solid fa-rotate-left text-xl"></i>
                    </div>
                </div>

                <!-- 內容區塊 (Grid Layout 切割版面，避免擁擠) -->
                <div class="flex-1 p-6 grid grid-cols-1 md:grid-cols-12 gap-6 overflow-y-auto custom-scrollbar bg-white">
                    
                    <!-- 左側欄：記憶連結 (佔 5 格) -->
                    <div class="md:col-span-5 flex flex-col">
                        
                        <!-- 統一的記憶筆記區塊 -->
                        <div class="bg-gradient-to-br from-indigo-50/80 to-slate-50 border border-indigo-100/50 rounded-2xl p-5 md:p-6 flex-1 relative overflow-hidden shadow-inner flex flex-col justify-start">
                            
                            <!-- 裝飾性浮水印圖示 (填補視覺空白) -->
                            <i class="fa-solid fa-brain absolute -bottom-8 -right-6 text-[180px] text-indigo-900/[0.03] rotate-12 pointer-events-none"></i>

                            <h4 class="text-indigo-800 font-bold text-sm mb-5 flex items-center gap-2 relative z-10">
                                <i class="fa-solid fa-wand-magic-sparkles text-amber-500"></i> 記憶筆記
                            </h4>
                            
                            <div class="space-y-4 relative z-10">
                                <!-- 諧音聯想 -->
                                <div class="bg-white/80 p-4 rounded-xl border border-white shadow-sm backdrop-blur-sm">
                                    <h5 class="text-xs font-bold text-amber-600 mb-2 flex items-center gap-2">
                                        <i class="fa-solid fa-lightbulb"></i> 諧音聯想
                                    </h5>
                                    <p id="homophone" class="text-slate-700 text-sm leading-relaxed zh-text">
                                        載入中...
                                    </p>
                                </div>

                                <!-- 字根拆解 -->
                                <div class="bg-white/80 p-4 rounded-xl border border-white shadow-sm backdrop-blur-sm">
                                    <h5 class="text-xs font-bold text-sky-600 mb-2 flex items-center gap-2">
                                        <i class="fa-solid fa-puzzle-piece"></i> 字根拆解
                                    </h5>
                                    <p id="roots" class="text-slate-700 text-sm leading-relaxed zh-text">
                                        載入中...
                                    </p>
                                </div>
                            </div>
                            
                            <!-- 底部引導留白文字 (穩定視覺重心) -->
                            <div class="mt-auto pt-8 text-center relative z-10 pointer-events-none">
                                <span class="text-[10px] font-semibold text-indigo-900/20 tracking-[0.2em] uppercase">Memory Hacks</span>
                            </div>
                        </div>
                    </div>

                    <!-- 右側欄：例句與情境 (佔 7 格) -->
                    <div class="md:col-span-7 flex flex-col">
                        
                        <!-- 例句區塊整體 -->
                        <div class="bg-slate-50/80 border border-slate-100 rounded-2xl p-5 md:p-6 flex-1 relative overflow-hidden flex flex-col">
                            
                            <!-- 裝飾性背景圖示 (填補視覺空白) -->
                            <i class="fa-solid fa-quote-right absolute -top-6 -right-4 text-[160px] text-slate-200/50 -rotate-12 pointer-events-none"></i>

                            <h4 class="text-slate-600 font-bold text-sm mb-6 flex items-center gap-2 relative z-10">
                                <i class="fa-solid fa-book-open text-indigo-400"></i> 情境例句
                            </h4>
                            
                            <!-- 使用 justify-center 讓例句置中，均勻分配上下空間避免空洞 -->
                            <div class="flex-1 flex flex-col justify-center gap-5 relative z-10">
                                
                                <!-- 例句 1 (卡片化設計) -->
                                <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100 relative group hover:shadow-md transition-shadow">
                                    <div class="absolute top-4 right-4 text-slate-300 group-hover:text-indigo-400 cursor-pointer transition-colors" title="播放發音" onclick="speakText('ex1-en', event)">
                                        <i class="fa-solid fa-volume-high"></i>
                                    </div>
                                    <div class="flex items-center gap-2 mb-2">
                                        <span class="text-[11px] font-bold bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded uppercase tracking-wider">Example 1</span>
                                    </div>
                                    <p id="ex1-en" class="text-lg text-slate-800 font-medium mb-3 pr-8 leading-relaxed">...</p>
                                    <p id="ex1-zh" class="text-slate-500 text-sm zh-text border-t border-slate-50 pt-3 mt-1">...</p>
                                </div>

                                <!-- 例句 2 (卡片化設計) -->
                                <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100 relative group hover:shadow-md transition-shadow">
                                    <div class="absolute top-4 right-4 text-slate-300 group-hover:text-indigo-400 cursor-pointer transition-colors" title="播放發音" onclick="speakText('ex2-en', event)">
                                        <i class="fa-solid fa-volume-high"></i>
                                    </div>
                                    <div class="flex items-center gap-2 mb-2">
                                        <span class="text-[11px] font-bold bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded uppercase tracking-wider">Example 2</span>
                                    </div>
                                    <p id="ex2-en" class="text-lg text-slate-800 font-medium mb-3 pr-8 leading-relaxed">...</p>
                                    <p id="ex2-zh" class="text-slate-500 text-sm zh-text border-t border-slate-50 pt-3 mt-1">...</p>
                                </div>

                            </div>
                        </div>

                    </div>

                </div>
            </div>
        </div>
        </div>
    </div>

    <button id="previous-word-button" type="button" class="fixed left-3 bottom-3 md:left-5 md:bottom-5 z-40 inline-flex h-12 w-12 items-center justify-center rounded-full border border-slate-200 bg-white text-slate-500 shadow-lg shadow-slate-300/40 transition hover:text-slate-800 hover:shadow-xl disabled:cursor-not-allowed disabled:opacity-40" title="回到上一張單字卡" disabled>
        <i class="fa-solid fa-arrow-left text-lg"></i>
    </button>

    <div id="review-summary-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-950/50 backdrop-blur-sm p-4">
        <div id="review-summary-panel" class="w-full max-w-xl rounded-[28px] bg-white shadow-2xl shadow-slate-900/20 overflow-hidden">
            <div class="px-6 md:px-8 pt-7 pb-5 bg-gradient-to-br from-indigo-600 via-indigo-500 to-sky-500 text-white">
                <p class="text-xs font-bold tracking-[0.25em] uppercase text-white/75 mb-2">Review Summary</p>
                <h2 class="text-2xl md:text-3xl font-bold">這一輪練習完成了</h2>
                <p id="summary-message" class="text-sm md:text-base text-white/85 mt-2">你已經完成本輪單字分類。</p>
            </div>

            <div class="p-6 md:p-8">
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-6">
                    <div class="rounded-2xl border border-slate-200 bg-slate-50 p-4">
                        <p class="text-xs font-bold uppercase tracking-[0.18em] text-slate-400 mb-2">複習了多少</p>
                        <p id="summary-reviewed-count" class="text-3xl font-extrabold text-slate-800">0</p>
                    </div>
                    <div class="rounded-2xl border border-orange-100 bg-orange-50 p-4">
                        <p class="text-xs font-bold uppercase tracking-[0.18em] text-orange-400 mb-2">還剩不會</p>
                        <p id="summary-unknown-count" class="text-3xl font-extrabold text-orange-600">0</p>
                    </div>
                    <div class="rounded-2xl border border-emerald-100 bg-emerald-50 p-4">
                        <p class="text-xs font-bold uppercase tracking-[0.18em] text-emerald-400 mb-2">完成單字</p>
                        <p id="summary-known-count" class="text-3xl font-extrabold text-emerald-600">0</p>
                    </div>
                </div>

                <div class="rounded-2xl bg-slate-50 border border-slate-200 px-4 py-3 text-sm text-slate-600 mb-6">
                    <span id="summary-progress-detail">本次共有 0 個單字。</span>
                </div>

                <div class="flex flex-col sm:flex-row gap-3">
                    <button id="continue-unknown-btn" type="button" class="flex-1 rounded-2xl bg-orange-500 text-white font-semibold px-5 py-3.5 hover:bg-orange-600 transition shadow-lg shadow-orange-200">
                        繼續複習不會的
                    </button>
                    <button id="restart-review-btn" type="button" class="flex-1 rounded-2xl bg-slate-900 text-white font-semibold px-5 py-3.5 hover:bg-slate-700 transition shadow-lg shadow-slate-300">
                        重新複習全部
                    </button>
                </div>
                <button id="back-home-btn" type="button" class="mt-3 w-full rounded-2xl border border-slate-200 bg-white text-slate-600 font-semibold px-5 py-3.5 hover:bg-slate-50 transition">
                    回到首頁
                </button>
            </div>
        </div>
    </div>

</body>

<script src="./static/js/vocabulary-card.js"></script>
<script src="./static/js/pwa.js"></script>
</html>
